name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff, whole scope)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.15.17

      # PRAC-01-FU5: WHOLE-SCOPE blocking gate (flipped from the line-scoped gate
      # once the bot/API scope reached 0 over FU-1..FU-4). `ruff check .` resolves
      # to exactly the in-scope set — pyproject [tool.ruff] extend-exclude keeps
      # media_service/scripts/docs out (their ~169 E/F tracked by PRAC-01-FU2),
      # force-exclude makes that hold for the explicit `.` path too. `.` also
      # covers ci/ + root *.py (which an explicit-path form would miss).
      # ci/ruff_changed_lines.py is kept in-tree as the documented fallback if a
      # future `select` expansion (I/UP/B/SIM) re-introduces a baseline.
      - name: Ruff (whole scope)
        run: ruff check .

  mypy:
    name: mypy (advisory, non-blocking)
    runs-on: ubuntu-latest
    # PRC-02 (audit #4): SURFACE type errors without blocking. Полное внедрение
    # mypy — отдельная многонедельная работа (~3118 ошибок сегодня); эта джоба
    # даёт видимость, флипнуть в ratchet/blocking по мере падения счётчика.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mypy
        run: pip install mypy==1.7.1

      # continue-on-error НА ШАГЕ (не на джобе): шаг fail-soft → джоба зелёная
      # (чек не красный, не блокирует merge), а вывод mypy остаётся в логах.
      # --ignore-missing-imports: сторонние стабы не требуются (как в pre-commit);
      # --explicit-package-bases + exclude tests/venv: обходит коллизию имён
      # пакетов (дубли __init__.py в tests), иначе mypy падает до проверки.
      - name: Mypy (advisory)
        continue-on-error: true
        run: mypy --ignore-missing-imports --explicit-package-bases --exclude '(/tests/|/venv/)' uk_management_bot

  pip-audit:
    name: pip-audit (dependency CVE gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit==2.9.0

      # REG-03: blocking CVE gate over the hash-pinned runtime lock. Two ignored
      # clusters, both unfixable-in-place:
      #   • aiohttp (11 CVEs) — fixes land in 3.14.x, which aiogram 3.28.2 caps
      #     out (`aiohttp<3.14`); drop these when aiogram is bumped + bump aiohttp.
      #   • ecdsa PYSEC-2026-1325 (= CVE-2024-23342, Minerva P-256 timing) — pulled
      #     transitively by python-jose. We sign JWTs with HS256 (HMAC) ONLY, never
      #     ECDSA, so the vulnerable sign_digest()/keygen/ECDH path is unreachable;
      #     verification is unaffected regardless, and python-ecdsa maintainers
      #     consider side-channels out of scope (no patched version exists).
      # Any NEW vuln in any OTHER package fails this job. Bumpable CVEs
      # (cryptography/python-multipart/starlette) were closed in the REG-03
      # dep-bump, so they must NOT reappear here.
      - name: Audit runtime dependencies
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2026-34993 \
            --ignore-vuln CVE-2026-47265 \
            --ignore-vuln CVE-2026-50269 \
            --ignore-vuln CVE-2026-54273 \
            --ignore-vuln CVE-2026-54274 \
            --ignore-vuln CVE-2026-54275 \
            --ignore-vuln CVE-2026-54276 \
            --ignore-vuln CVE-2026-54277 \
            --ignore-vuln CVE-2026-54278 \
            --ignore-vuln CVE-2026-54279 \
            --ignore-vuln CVE-2026-54280 \
            --ignore-vuln PYSEC-2026-1325

  backend-tests:
    name: backend-tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: uk_management
          POSTGRES_USER: uk_bot
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U uk_bot -d uk_management"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://uk_bot:postgres@localhost:5432/uk_management"
      REDIS_URL: "redis://localhost:6379/0"
      PYTHONPATH: "${{ github.workspace }}"
      BOT_TOKEN: "ci:dummy-token"
      JWT_SECRET: "ci-dummy-secret"
      INVITE_SECRET: "ci-dummy-secret"
      UK_WEBHOOK_SECRET: "ci-dummy-secret"
      INFRASAFE_WEBHOOK_SECRET: "ci-dummy-secret"
      ADMIN_PASSWORD: "ci-dummy-admin-pw-0123456"
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # requirements.txt is hash-pinned (pip auto-enables --require-hashes when
      # hashes are present), so it MUST be installed on its own — mixing with the
      # un-hashed requirements-dev.txt in one invocation makes pip reject the run.
      - name: Install runtime deps (hash-pinned)
        run: pip install -r requirements.txt

      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      # PRC-05: цепочка 001..037 схлопнута в squashed baseline 001 + seed 002,
      # воспроизводящий фактическую прод-схему. Прежний костыль create_all+stamp
      # 006+upgrade head больше не нужен (и невозможен — revision 006 удалён):
      # baseline применяется на пустую БД напрямую. `alembic check` = дрейф-гейт
      # (модели == миграции; 0 операций autogenerate, media/date_prefix исключены).
      - name: Apply migrations + drift-gate
        run: |
          python -m alembic upgrade head
          python -m alembic check

      # pyproject.toml drives the run: testpaths=[uk_management_bot] (colocated
      # unit/handlers/service suite), asyncio_mode=auto, --import-mode=importlib.
      # PRC-01 (audit #4): measure backend coverage. `coverage run` reads
      # [tool.coverage.run] from pyproject (source=uk_management_bot, handlers/
      # tests omitted); the API suite below appends (`-a`) into the same data
      # file, and a final ratchet step enforces the combined floor.
      - name: Run unit suite (uk_management_bot)
        run: coverage run -m pytest -q

      # API + integration/SSOT-gate suite. Lives under tests/ with its own
      # sqlite conftests (tests/api → in-memory aiosqlite + dependency
      # overrides; tests/services → DATABASE_URL=sqlite). Run as a separate
      # invocation (not in testpaths) so the sqlite suite isn't collected
      # together with the postgres unit suite. BLOCKING — these gates protect
      # the request-workflow SSOT write/read path and the public API contract.
      - name: Run API + integration/gate suite (tests/api, tests/services)
        # The outbox/webhook gate tests assert that a status change queues an
        # InfraSafe webhook — that emission is gated on INFRASAFE_WEBHOOK_ENABLED
        # (default false). dev/prod containers set it true; enable it here too so
        # the gate exercises the real emission path. Step-scoped so the unit
        # suite above keeps running with webhooks disabled.
        env:
          INFRASAFE_WEBHOOK_ENABLED: "true"
        run: coverage run -a -m pytest -q tests/api tests/services

      # PRC-01 (audit #4): ratchet-floor on combined backend coverage. Regression
      # guard set just below the current measured 66.0% — RAISE as coverage grows,
      # never lower. Not the aspirational 80%: this only prevents backsliding.
      - name: Coverage floor (ratchet)
        run: |
          coverage report
          coverage report --fail-under=65

  access-control-tests:
    name: access-control-tests (postgres)
    runs-on: ubuntu-latest
    # ОТДЕЛЬНЫЙ job именно на PostgreSQL: набор access_control проверяет
    # advisory-lock (§13.2), append-only PL/pgSQL-триггеры (§9.7), DB-grant
    # роль access_app_rw (миграция 031), partial-unique индексы и
    # INSERT ... ON CONFLICT (§10.1) — на sqlite это не воспроизводится. Гейт
    # access_control/tests/test_environment.py ПАДАЕТ (а не skip) на sqlite,
    # поэтому набор обязан гоняться против реального postgres.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: uk_management
          POSTGRES_USER: uk_bot
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U uk_bot -d uk_management"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://uk_bot:postgres@localhost:5432/uk_management"
      REDIS_URL: "redis://localhost:6379/0"
      PYTHONPATH: "${{ github.workspace }}"
      BOT_TOKEN: "ci:dummy-token"
      JWT_SECRET: "ci-dummy-secret"
      INVITE_SECRET: "ci-dummy-secret"
      UK_WEBHOOK_SECRET: "ci-dummy-secret"
      INFRASAFE_WEBHOOK_SECRET: "ci-dummy-secret"
      ADMIN_PASSWORD: "ci-dummy-admin-pw-0123456"
      DEBUG: "true"
      # Код access_control падает RuntimeError'ом без этих seed-ов (H2/M1: прод-
      # дефолтов в исходнике нет). Значения СИНТЕТИЧЕСКИЕ, не секреты — те же, что
      # ставит access_control/tests/conftest.py через os.environ.setdefault.
      # SIGNING_SEED обязан быть 64 hex-символа.
      ACCESS_SNAPSHOT_SIGNING_SEED: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
      ACCESS_DEVICE_HMAC_SEED: "pilot-test-hmac-seed"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # requirements.txt хэш-пиннится (pip включает --require-hashes при наличии
      # хэшей) — ставится отдельным вызовом, как в backend-tests.
      - name: Install runtime deps (hash-pinned)
        run: pip install -r requirements.txt

      # requirements-dev.txt уже содержит pytest + pytest-cov.
      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      # PRC-05: squashed baseline 001 (+ seed 002) применяется напрямую на пустую
      # БД — включает таблицы access_control, append-only триггеры (§9.7) и DB-grant
      # роль access_app_rw. Под суперпользователем postgres (POSTGRES_USER) DO-блок
      # роли имеет CREATEROLE → grant-тест проверяется реально, а не skip.
      - name: Apply migrations + drift-gate
        run: |
          python -m alembic upgrade head
          python -m alembic check

      # Набор access_control. Покрытие — информативное (--cov-report=term-missing),
      # без жёсткого порога (--cov-fail-under не задан), чтобы не блокировать на
      # этапе пилота. Падение гейта окружения здесь означает, что прогон ушёл не
      # на postgres.
      - name: Run access_control suite (postgres)
        run: pytest access_control/tests -q --cov=access_control --cov-report=term-missing

  b0-least-privilege:
    name: b0-least-privilege (restricted migrator)
    runs-on: ubuntu-latest
    # PRC-05 B0: доказать fresh-install baseline под НАСТОЯЩЕЙ least-privilege ролью.
    # В backend/access-control джобах POSTGRES_USER=uk_bot создаётся СУПЕРПОЛЬЗОВАТЕЛЕМ
    # (дефолт образа postgres) — поэтому там НЕ ловятся два реальных провала fresh-
    # install: (а) мигратор без CREATE-на-schema public не создаёт даже alembic_version;
    # (б) DO-блок роли под NOCREATEROLE. Здесь суперпользователь — postgres, а мигратор
    # uk_bot = NOSUPERUSER/NOCREATEDB/NOCREATEROLE + владелец БД/схемы; access_app_rw
    # провизионит АДМИН ДО upgrade (мигратор её создать не может — и не должен).
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: uk_management
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d uk_management"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: "${{ github.workspace }}"
      BOT_TOKEN: "ci:dummy-token"
      JWT_SECRET: "ci-dummy-secret"
      INVITE_SECRET: "ci-dummy-secret"
      UK_WEBHOOK_SECRET: "ci-dummy-secret"
      INFRASAFE_WEBHOOK_SECRET: "ci-dummy-secret"
      ADMIN_PASSWORD: "ci-dummy-admin-pw-0123456"
      DEBUG: "true"
      ACCESS_SNAPSHOT_SIGNING_SEED: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
      ACCESS_DEVICE_HMAC_SEED: "pilot-test-hmac-seed"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime deps (hash-pinned)
        run: pip install -r requirements.txt

      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      # B0-предусловия — ровно то, что на fresh-install делает АДМИН через uk_admin
      # (НЕ мигратор): (1) restricted-мигратор uk_bot LOGIN, но NOSUPERUSER/NOCREATEDB/
      # NOCREATEROLE; (2) владение БД+схемой → uk_bot может CREATE объекты и GRANT'ить
      # на свои таблицы и на схему, но НЕ создавать роли и НЕ быть суперпользователем;
      # (3) роль access_app_rw создаётся ЗАРАНЕЕ — DO-блок baseline тогда пропускает
      # CREATE ROLE (мигратор NOCREATEROLE) и просто вешает гранты.
      - name: Provision B0 preconditions (as admin/superuser)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d uk_management -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE uk_bot LOGIN PASSWORD 'ci_uk_bot_pw' NOSUPERUSER NOCREATEDB NOCREATEROLE;
          CREATE ROLE access_app_rw NOLOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT;
          ALTER DATABASE uk_management OWNER TO uk_bot;
          ALTER SCHEMA public OWNER TO uk_bot;
          SQL

      # Часовой: если кто-то случайно сделает мигратора суперпользователем/CREATEROLE,
      # этот шаг ПАДАЕТ — иначе B0-джоба бесшумно ослабнет до фиктивной.
      - name: Assert migrator is genuinely least-privilege
        env:
          PGPASSWORD: postgres
        run: |
          caps=$(psql -h localhost -U postgres -d uk_management -tAc \
            "SELECT rolsuper||'/'||rolcreatedb||'/'||rolcreaterole FROM pg_roles WHERE rolname='uk_bot'")
          echo "uk_bot super/createdb/createrole = $caps"
          test "$caps" = "false/false/false" || { echo "::error::migrator uk_bot is NOT least-privilege ($caps)"; exit 1; }

      # Собственно B0: baseline применяется САМИМ restricted-мигратором. Ловит оба
      # провала fresh-install (нет CREATE-на-public → нет alembic_version; DO-блок роли
      # падает вместо skip) + дрейф-гейт. `check` под NOCREATEROLE тоже обязан работать.
      - name: Apply migrations as restricted migrator + drift-gate
        env:
          DATABASE_URL: "postgresql://uk_bot:ci_uk_bot_pw@localhost:5432/uk_management"
        run: |
          python -m alembic upgrade head
          python -m alembic check

      # Least-privilege реально ВНЕДРЁН, а не заскипан: append-only таблица выдала
      # access_app_rw SELECT+INSERT и НЕ выдала UPDATE/DELETE (иначе append-only обходим).
      - name: Assert access_app_rw grants (least-privilege wired, not skipped)
        env:
          PGPASSWORD: postgres
        run: |
          g=$(psql -h localhost -U postgres -d uk_management -tAc \
            "SELECT string_agg(privilege_type, ',' ORDER BY privilege_type) FROM information_schema.role_table_grants WHERE grantee='access_app_rw' AND table_name='access_events'")
          echo "access_app_rw on access_events = [$g]"
          test "$g" = "INSERT,SELECT" || { echo "::error::append-only grants wrong (want INSERT,SELECT, got [$g])"; exit 1; }

      # PRC-05 review-P1: baseline downgrade обязан быть ОБРАТИМЫМ. autogen не дропает
      # use_alter FK'ы (циклы), append-only функцию и 3 native enum-типа → без ручных
      # drop_constraint/DROP FUNCTION/DROP TYPE `downgrade base` падал, а re-upgrade —
      # `type already exists`. Гоняем на ЭТОЙ одноразовой B0-БД (pytest её не трогает):
      # upgrade→downgrade base (0 остатка)→re-upgrade→drift-check. Мигратор uk_bot
      # владеет объектами → дропает их сам, без superuser.
      - name: Downgrade roundtrip (upgrade → downgrade base → upgrade)
        env:
          DATABASE_URL: "postgresql://uk_bot:ci_uk_bot_pw@localhost:5432/uk_management"
        run: |
          python -m alembic downgrade base
          left=$(PGPASSWORD=postgres psql -h localhost -U postgres -d uk_management -tAc \
            "SELECT (SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_name<>'alembic_version')||'/'||(SELECT count(*) FROM pg_type WHERE typtype='e')||'/'||(SELECT count(*) FROM pg_proc WHERE proname='access_control_append_only_guard')")
          echo "residual tables/enum-types/guard-fn after downgrade base = $left"
          test "$left" = "0/0/0" || { echo "::error::downgrade base left residue ($left) — use_alter FK / enum type / guard fn not dropped"; exit 1; }
          python -m alembic upgrade head
          python -m alembic check

  images-build:
    name: images-build (docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: "type=gha,mode=max"

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          load: false
          cache-from: type=gha
          cache-to: "type=gha,mode=max"

      # PRC-04: uk-access-api — живой prod-сервис; его сборку тоже гейтим в CI,
      # чтобы поломка Dockerfile.access ловилась до деплоя. Отдельный cache-scope,
      # чтобы не тереть gha-кэш bot/api.
      - name: Build access image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.access
          push: false
          load: false
          cache-from: type=gha,scope=access
          cache-to: "type=gha,mode=max,scope=access"

  frontend:
    name: frontend (build + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # Brand-hardcode guard: сырой бренд-цвет/лого в компонентах (вместо токенов)
      # разъезжает PROFK/InfraSafe. Падает на неразрешённом совпадении.
      - name: Brand-hardcode guard
        run: npm run guard:brand

      # PRC-03 (audit #4): eslint теперь BLOCKING. Все 60 legacy-ошибок устранены
      # (no-explicit-any→unknown/типы, вынос не-компонентных экспортов, обоснованный
      # eslint-disable для намеренных react-hooks-паттернов); `npm run lint`
      # (`eslint .`) падает только на errors (0 сейчас), 8 warnings терпимы.
      - name: Lint (blocking)
        run: npm run lint

      # `npm run build` = `tsc -b && vite build` — the real typecheck + build gate
      # (дефолтный бренд InfraSafe).
      - run: npm run build

      # Вторая бренд-сборка — ловит поломки PROFK-ветки (компиляция, HTML-трансформ
      # transformIndexHtml) до прода. Тесты/линт бренд-агностичны → один раз.
      - name: Build PROFK brand variant
        run: npm run build:profk

      # TEST-068: vitest + coverage. The threshold is a ratchet floor (see
      # frontend/vitest.config.ts) raised per phase toward 80% — blocking, but
      # it can only fail on a regression below the current floor, not on the
      # not-yet-covered surface.
      - name: Tests + coverage (TEST-068 ratchet)
        run: npm run test:cov
