name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff, whole scope)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.15.17

      # PRAC-01-FU5: WHOLE-SCOPE blocking gate (flipped from the line-scoped gate
      # once the bot/API scope reached 0 over FU-1..FU-4). `ruff check .` resolves
      # to exactly the in-scope set — pyproject [tool.ruff] extend-exclude keeps
      # media_service/scripts/docs out (their ~169 E/F tracked by PRAC-01-FU2),
      # force-exclude makes that hold for the explicit `.` path too. `.` also
      # covers ci/ + root *.py (which an explicit-path form would miss).
      # ci/ruff_changed_lines.py is kept in-tree as the documented fallback if a
      # future `select` expansion (I/UP/B/SIM) re-introduces a baseline.
      - name: Ruff (whole scope)
        run: ruff check .

  mypy:
    name: mypy (advisory, non-blocking)
    runs-on: ubuntu-latest
    # PRC-02 (audit #4): SURFACE type errors without blocking. Полное внедрение
    # mypy — отдельная многонедельная работа (~3118 ошибок сегодня); эта джоба
    # даёт видимость, флипнуть в ratchet/blocking по мере падения счётчика.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mypy
        run: pip install mypy==1.7.1

      # continue-on-error НА ШАГЕ (не на джобе): шаг fail-soft → джоба зелёная
      # (чек не красный, не блокирует merge), а вывод mypy остаётся в логах.
      # --ignore-missing-imports: сторонние стабы не требуются (как в pre-commit);
      # --explicit-package-bases + exclude tests/venv: обходит коллизию имён
      # пакетов (дубли __init__.py в tests), иначе mypy падает до проверки.
      - name: Mypy (advisory)
        continue-on-error: true
        run: mypy --ignore-missing-imports --explicit-package-bases --exclude '(/tests/|/venv/)' uk_management_bot

  bandit:
    name: bandit (SAST, uk_management_bot + access_control)
    runs-on: ubuntu-latest
    # AUD3-02: baseline (2026-07-15, Step 0) — 0 High/High до фикса B324
    # (MD5 без usedforsecurity=False в handlers/auth.py:165, исправлено в этом
    # же PR); после фикса узкий порог -iii -lll реально чист (empirically
    # verified: `bandit -iii -lll` → "No issues identified", exit 0) — сразу
    # blocking, не advisory-заглушка. Полный скан (Low/Medium — 63 находки,
    # типичный SAST-шум) — отдельный always-advisory шаг, НЕ blocking.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit==1.9.4

      # Exclude: uk_management_bot содержит co-located test-файлы ВНЕ tests/
      # (например api/test_dependencies.py, database/test_init_admin.py,
      # middlewares/test_auth.py) — */tests/* сам по себе их не ловит,
      # */test_*.py нужен отдельно. access_control/tests/ покрывается */tests/*.
      - name: Bandit — High confidence + High severity (blocking)
        run: |
          bandit -r uk_management_bot access_control \
            -x '*/tests/*,*/test_*.py,*/venv/*,*/.venv/*' \
            -iii -lll

      # Отдельный шаг — Medium/Low видимость. if: always() обязателен, НЕ
      # только continue-on-error: без него шаг выше (без continue-on-error)
      # проваливает job, и GitHub Actions по умолчанию (implicit if: success())
      # пропускает ВСЕ последующие шаги — в момент будущей High/High-регрессии
      # именно этот "always-advisory" шаг молча не выполнился бы, хотя его
      # Medium/Low-контекст нужнее всего для триажа.
      - name: Bandit — full scan (advisory, Low/Medium visibility)
        if: always()
        continue-on-error: true
        run: |
          bandit -r uk_management_bot access_control \
            -x '*/tests/*,*/test_*.py,*/venv/*,*/.venv/*'

  npm-audit:
    name: npm-audit (frontend dependency CVE gate)
    runs-on: ubuntu-latest
    # AUD3-02: отдельная top-level job, НЕ шаг внутри `frontend` (та имеет
    # guard:brand → Lint(blocking) → build → build:profk → test:cov без единого
    # if: always() — blocking npm-audit-шаг там пропустил бы ВСЕ остальные
    # проверки frontend job'ы для КАЖДОГО PR при будущей high/critical-находке
    # на транзитивную зависимость, даже для PR, не трогающих зависимости).
    # Baseline (2026-07-15, Step 0): 0 уязвимостей на всех уровнях —
    # --audit-level=high сразу blocking, единственный шаг (--audit-level меняет
    # только exit-code threshold, не фильтрует вывод — второй "полный" прогон
    # был бы тем же самым выводом второй раз).
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Audit frontend dependencies (blocking on high/critical)
        run: npm audit --omit=dev --audit-level=high

  pip-audit:
    name: pip-audit (dependency CVE gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit==2.9.0

      # REG-03: blocking CVE gate over the hash-pinned runtime lock. Two ignored
      # clusters, both unfixable-in-place:
      #   • aiohttp (11 CVEs) — fixes land in 3.14.x, which aiogram 3.28.2 caps
      #     out (`aiohttp<3.14`); drop these when aiogram is bumped + bump aiohttp.
      #   • ecdsa PYSEC-2026-1325 (= CVE-2024-23342, Minerva P-256 timing) — pulled
      #     transitively by python-jose. We sign JWTs with HS256 (HMAC) ONLY, never
      #     ECDSA, so the vulnerable sign_digest()/keygen/ECDH path is unreachable;
      #     verification is unaffected regardless, and python-ecdsa maintainers
      #     consider side-channels out of scope (no patched version exists).
      # Any NEW vuln in any OTHER package fails this job. Bumpable CVEs
      # (cryptography/python-multipart/starlette) were closed in the REG-03
      # dep-bump, so they must NOT reappear here.
      - name: Audit runtime dependencies
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2026-34993 \
            --ignore-vuln CVE-2026-47265 \
            --ignore-vuln CVE-2026-50269 \
            --ignore-vuln CVE-2026-54273 \
            --ignore-vuln CVE-2026-54274 \
            --ignore-vuln CVE-2026-54275 \
            --ignore-vuln CVE-2026-54276 \
            --ignore-vuln CVE-2026-54277 \
            --ignore-vuln CVE-2026-54278 \
            --ignore-vuln CVE-2026-54279 \
            --ignore-vuln CVE-2026-54280 \
            --ignore-vuln PYSEC-2026-1325

  backend-tests:
    name: backend-tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: uk_management
          POSTGRES_USER: uk_bot
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U uk_bot -d uk_management"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://uk_bot:postgres@localhost:5432/uk_management"
      REDIS_URL: "redis://localhost:6379/0"
      PYTHONPATH: "${{ github.workspace }}"
      BOT_TOKEN: "ci:dummy-token"
      JWT_SECRET: "ci-dummy-secret"
      INVITE_SECRET: "ci-dummy-secret"
      UK_WEBHOOK_SECRET: "ci-dummy-secret"
      INFRASAFE_WEBHOOK_SECRET: "ci-dummy-secret"
      ADMIN_PASSWORD: "ci-dummy-admin-pw-0123456"
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # requirements.txt is hash-pinned (pip auto-enables --require-hashes when
      # hashes are present), so it MUST be installed on its own — mixing with the
      # un-hashed requirements-dev.txt in one invocation makes pip reject the run.
      - name: Install runtime deps (hash-pinned)
        run: pip install -r requirements.txt

      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      # PRC-05: цепочка 001..037 схлопнута в squashed baseline 001 + seed 002,
      # воспроизводящий фактическую прод-схему. Прежний костыль create_all+stamp
      # 006+upgrade head больше не нужен (и невозможен — revision 006 удалён):
      # baseline применяется на пустую БД напрямую. `alembic check` = дрейф-гейт
      # (модели == миграции; 0 операций autogenerate, media/date_prefix исключены).
      - name: Apply migrations + drift-gate
        run: |
          python -m alembic upgrade head
          python -m alembic check

      # pyproject.toml drives the run: testpaths=[uk_management_bot] (colocated
      # unit/handlers/service suite), asyncio_mode=auto, --import-mode=importlib.
      # PRC-01 (audit #4): measure backend coverage. `coverage run` reads
      # [tool.coverage.run] from pyproject (source=uk_management_bot, handlers/
      # tests omitted); the API suite below appends (`-a`) into the same data
      # file, and a final ratchet step enforces the combined floor.
      - name: Run unit suite (uk_management_bot)
        run: coverage run -m pytest -q

      # API + integration/SSOT-gate suite. Lives under tests/ with its own
      # sqlite conftests (tests/api → in-memory aiosqlite + dependency
      # overrides; tests/services → DATABASE_URL=sqlite). Run as a separate
      # invocation (not in testpaths) so the sqlite suite isn't collected
      # together with the postgres unit suite. BLOCKING — these gates protect
      # the request-workflow SSOT write/read path and the public API contract.
      - name: Run API + integration/gate suite (tests/api, tests/services)
        # The outbox/webhook gate tests assert that a status change queues an
        # InfraSafe webhook — that emission is gated on INFRASAFE_WEBHOOK_ENABLED
        # (default false). dev/prod containers set it true; enable it here too so
        # the gate exercises the real emission path. Step-scoped so the unit
        # suite above keeps running with webhooks disabled.
        env:
          INFRASAFE_WEBHOOK_ENABLED: "true"
        run: coverage run -a -m pytest -q tests/api tests/services

      # PRC-01 (audit #4): ratchet-floor on combined backend coverage. Regression
      # guard set just below the current measured 66.0% — RAISE as coverage grows,
      # never lower. Not the aspirational 80%: this only prevents backsliding.
      - name: Coverage floor (ratchet)
        run: |
          coverage report
          coverage report --fail-under=65

  access-control-tests:
    name: access-control-tests (postgres)
    runs-on: ubuntu-latest
    # ОТДЕЛЬНЫЙ job именно на PostgreSQL: набор access_control проверяет
    # advisory-lock (§13.2), append-only PL/pgSQL-триггеры (§9.7), DB-grant
    # роль access_app_rw (миграция 031), partial-unique индексы и
    # INSERT ... ON CONFLICT (§10.1) — на sqlite это не воспроизводится. Гейт
    # access_control/tests/test_environment.py ПАДАЕТ (а не skip) на sqlite,
    # поэтому набор обязан гоняться против реального postgres.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: uk_management
          POSTGRES_USER: uk_bot
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U uk_bot -d uk_management"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://uk_bot:postgres@localhost:5432/uk_management"
      REDIS_URL: "redis://localhost:6379/0"
      PYTHONPATH: "${{ github.workspace }}"
      BOT_TOKEN: "ci:dummy-token"
      JWT_SECRET: "ci-dummy-secret"
      INVITE_SECRET: "ci-dummy-secret"
      UK_WEBHOOK_SECRET: "ci-dummy-secret"
      INFRASAFE_WEBHOOK_SECRET: "ci-dummy-secret"
      ADMIN_PASSWORD: "ci-dummy-admin-pw-0123456"
      DEBUG: "true"
      # Код access_control падает RuntimeError'ом без этих seed-ов (H2/M1: прод-
      # дефолтов в исходнике нет). Значения СИНТЕТИЧЕСКИЕ, не секреты — те же, что
      # ставит access_control/tests/conftest.py через os.environ.setdefault.
      # SIGNING_SEED обязан быть 64 hex-символа.
      ACCESS_SNAPSHOT_SIGNING_SEED: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
      ACCESS_DEVICE_HMAC_SEED: "pilot-test-hmac-seed"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # requirements.txt хэш-пиннится (pip включает --require-hashes при наличии
      # хэшей) — ставится отдельным вызовом, как в backend-tests.
      - name: Install runtime deps (hash-pinned)
        run: pip install -r requirements.txt

      # requirements-dev.txt уже содержит pytest + pytest-cov.
      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      # PRC-05: squashed baseline 001 (+ seed 002) применяется напрямую на пустую
      # БД — включает таблицы access_control, append-only триггеры (§9.7) и DB-grant
      # роль access_app_rw. Под суперпользователем postgres (POSTGRES_USER) DO-блок
      # роли имеет CREATEROLE → grant-тест проверяется реально, а не skip.
      - name: Apply migrations + drift-gate
        run: |
          python -m alembic upgrade head
          python -m alembic check

      # Набор access_control. Покрытие — информативное (--cov-report=term-missing),
      # без жёсткого порога (--cov-fail-under не задан), чтобы не блокировать на
      # этапе пилота. Падение гейта окружения здесь означает, что прогон ушёл не
      # на postgres.
      - name: Run access_control suite (postgres)
        run: pytest access_control/tests -q --cov=access_control --cov-report=term-missing

  b0-least-privilege:
    name: b0-least-privilege (restricted migrator)
    runs-on: ubuntu-latest
    # PRC-05 B0: доказать fresh-install baseline под НАСТОЯЩЕЙ least-privilege ролью.
    # В backend/access-control джобах POSTGRES_USER=uk_bot создаётся СУПЕРПОЛЬЗОВАТЕЛЕМ
    # (дефолт образа postgres) — поэтому там НЕ ловятся два реальных провала fresh-
    # install: (а) мигратор без CREATE-на-schema public не создаёт даже alembic_version;
    # (б) DO-блок роли под NOCREATEROLE. Здесь суперпользователь — postgres, а мигратор
    # uk_bot = NOSUPERUSER/NOCREATEDB/NOCREATEROLE + владелец БД/схемы; access_app_rw
    # провизионит АДМИН ДО upgrade (мигратор её создать не может — и не должен).
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: uk_management
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d uk_management"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: "${{ github.workspace }}"
      BOT_TOKEN: "ci:dummy-token"
      JWT_SECRET: "ci-dummy-secret"
      INVITE_SECRET: "ci-dummy-secret"
      UK_WEBHOOK_SECRET: "ci-dummy-secret"
      INFRASAFE_WEBHOOK_SECRET: "ci-dummy-secret"
      ADMIN_PASSWORD: "ci-dummy-admin-pw-0123456"
      DEBUG: "true"
      ACCESS_SNAPSHOT_SIGNING_SEED: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
      ACCESS_DEVICE_HMAC_SEED: "pilot-test-hmac-seed"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime deps (hash-pinned)
        run: pip install -r requirements.txt

      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      # B0-предусловия — ровно то, что на fresh-install делает АДМИН через uk_admin
      # (НЕ мигратор): (1) restricted-мигратор uk_bot LOGIN, но NOSUPERUSER/NOCREATEDB/
      # NOCREATEROLE; (2) владение БД+схемой → uk_bot может CREATE объекты и GRANT'ить
      # на свои таблицы и на схему, но НЕ создавать роли и НЕ быть суперпользователем;
      # (3) роль access_app_rw создаётся ЗАРАНЕЕ — DO-блок baseline тогда пропускает
      # CREATE ROLE (мигратор NOCREATEROLE) и просто вешает гранты.
      - name: Provision B0 preconditions (as admin/superuser)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d uk_management -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE uk_bot LOGIN PASSWORD 'ci_uk_bot_pw' NOSUPERUSER NOCREATEDB NOCREATEROLE;
          CREATE ROLE access_app_rw NOLOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT;
          ALTER DATABASE uk_management OWNER TO uk_bot;
          ALTER SCHEMA public OWNER TO uk_bot;
          SQL

      # Часовой: если кто-то случайно сделает мигратора суперпользователем/CREATEROLE,
      # этот шаг ПАДАЕТ — иначе B0-джоба бесшумно ослабнет до фиктивной.
      - name: Assert migrator is genuinely least-privilege
        env:
          PGPASSWORD: postgres
        run: |
          caps=$(psql -h localhost -U postgres -d uk_management -tAc \
            "SELECT rolsuper||'/'||rolcreatedb||'/'||rolcreaterole FROM pg_roles WHERE rolname='uk_bot'")
          echo "uk_bot super/createdb/createrole = $caps"
          test "$caps" = "false/false/false" || { echo "::error::migrator uk_bot is NOT least-privilege ($caps)"; exit 1; }

      # Собственно B0: baseline применяется САМИМ restricted-мигратором. Ловит оба
      # провала fresh-install (нет CREATE-на-public → нет alembic_version; DO-блок роли
      # падает вместо skip) + дрейф-гейт. `check` под NOCREATEROLE тоже обязан работать.
      - name: Apply migrations as restricted migrator + drift-gate
        env:
          DATABASE_URL: "postgresql://uk_bot:ci_uk_bot_pw@localhost:5432/uk_management"
        run: |
          python -m alembic upgrade head
          python -m alembic check

      # Least-privilege реально ВНЕДРЁН, а не заскипан: append-only таблица выдала
      # access_app_rw SELECT+INSERT и НЕ выдала UPDATE/DELETE (иначе append-only обходим).
      - name: Assert access_app_rw grants (least-privilege wired, not skipped)
        env:
          PGPASSWORD: postgres
        run: |
          g=$(psql -h localhost -U postgres -d uk_management -tAc \
            "SELECT string_agg(privilege_type, ',' ORDER BY privilege_type) FROM information_schema.role_table_grants WHERE grantee='access_app_rw' AND table_name='access_events'")
          echo "access_app_rw on access_events = [$g]"
          test "$g" = "INSERT,SELECT" || { echo "::error::append-only grants wrong (want INSERT,SELECT, got [$g])"; exit 1; }

      # PRC-05 review-P1: baseline downgrade обязан быть ОБРАТИМЫМ. autogen не дропает
      # use_alter FK'ы (циклы), append-only функцию и 3 native enum-типа → без ручных
      # drop_constraint/DROP FUNCTION/DROP TYPE `downgrade base` падал, а re-upgrade —
      # `type already exists`. Гоняем на ЭТОЙ одноразовой B0-БД (pytest её не трогает):
      # upgrade→downgrade base (0 остатка)→re-upgrade→drift-check. Мигратор uk_bot
      # владеет объектами → дропает их сам, без superuser.
      - name: Downgrade roundtrip (upgrade → downgrade base → upgrade)
        env:
          DATABASE_URL: "postgresql://uk_bot:ci_uk_bot_pw@localhost:5432/uk_management"
        run: |
          python -m alembic downgrade base
          left=$(PGPASSWORD=postgres psql -h localhost -U postgres -d uk_management -tAc \
            "SELECT (SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_name<>'alembic_version')||'/'||(SELECT count(*) FROM pg_type WHERE typtype='e')||'/'||(SELECT count(*) FROM pg_proc WHERE proname='access_control_append_only_guard')")
          echo "residual tables/enum-types/guard-fn after downgrade base = $left"
          test "$left" = "0/0/0" || { echo "::error::downgrade base left residue ($left) — use_alter FK / enum type / guard fn not dropped"; exit 1; }
          python -m alembic upgrade head
          python -m alembic check

  pg-role-separation:
    name: pg-role-separation (PR-7 / F-01)
    runs-on: ubuntu-latest
    # PR-7 (F-01): доказывает саму модель разделения ролей поверх B0 (которая
    # проверяет только restricted-мигратор uk_bot, всё ещё владеющий схемой).
    # Здесь — полный целевой граф: uk_migration_owner (owner, NOLOGIN) →
    # uk_migrator (LOGIN NOINHERIT, SET SESSION ROLE) создаёт объекты; three
    # runtime-роли (uk_bot_runtime/uk_api_runtime/uk_access_runtime) получают
    # DML только через group-роли (uk_app_rw/access_app_rw), без ownership.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: uk_management
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d uk_management"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: "${{ github.workspace }}"
      BOT_TOKEN: "ci:dummy-token"
      JWT_SECRET: "ci-dummy-secret"
      INVITE_SECRET: "ci-dummy-secret"
      UK_WEBHOOK_SECRET: "ci-dummy-secret"
      INFRASAFE_WEBHOOK_SECRET: "ci-dummy-secret"
      ADMIN_PASSWORD: "ci-dummy-admin-pw-0123456"
      DEBUG: "true"
      ACCESS_SNAPSHOT_SIGNING_SEED: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
      ACCESS_DEVICE_HMAC_SEED: "pilot-test-hmac-seed"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime deps (hash-pinned)
        run: pip install -r requirements.txt

      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      # Сценарий (б) из плана: REQUIRE_MIGRATION_OWNER=1 на fresh DB БЕЗ
      # provisioning обязан остановить миграцию явной ошибкой, а не тихо
      # продолжить от имени того, кем реально подключились.
      - name: Fail-closed guard — REQUIRE_MIGRATION_OWNER without provisioning
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/uk_management"
          REQUIRE_MIGRATION_OWNER: "1"
        run: |
          if python -m alembic upgrade head > /tmp/fail-closed.log 2>&1; then
            echo "::error::expected alembic upgrade head to fail (uk_migration_owner not provisioned) but it succeeded"
            cat /tmp/fail-closed.log
            exit 1
          fi
          cat /tmp/fail-closed.log
          grep -q "REQUIRE_MIGRATION_OWNER=1, но роль uk_migration_owner не найдена" /tmp/fail-closed.log \
            || { echo "::error::migration failed, but not for the expected reason"; exit 1; }

      - name: Provision roles (scripts/provision_roles.sql, as superuser)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d uk_management -v ON_ERROR_STOP=1 \
            -v migrator_pw=ci_migrator_pw -v bot_pw=ci_bot_pw \
            -v api_pw=ci_api_pw -v access_pw=ci_access_pw \
            -f scripts/provision_roles.sql

      # Инъекция эскалации МЕЖДУ первым и вторым прогоном — без неё "Assert
      # provisioned memberships" ниже проверяет только терминальное состояние
      # неадверсариального прогона и НЕ является реальным regression-тестом
      # для 3-й (эскалационной) ветки реконсиляции в provision_roles.sql:
      # без инъекции эта ветка никогда не находит что revoke'ить, и assertion
      # прошёл бы зелёным даже если саму 3-ю ветку случайно удалить в будущем.
      - name: Inject a privilege-escalation attempt (adversarial, before 2nd provision run)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d uk_management -v ON_ERROR_STOP=1 -c "
            CREATE ROLE ci_pr7_intruder LOGIN PASSWORD 'x';
            GRANT uk_migrator TO ci_pr7_intruder;
          "
          injected=$(psql -h localhost -U postgres -d uk_management -tAc \
            "SELECT count(*) FROM pg_auth_members m JOIN pg_roles mr ON mr.oid = m.member WHERE mr.rolname = 'ci_pr7_intruder'")
          test "$injected" = "1" || { echo "::error::escalation injection itself failed — test fixture is broken"; exit 1; }

      # Второй прогон — конвергентная реконсиляция, не только "создать при
      # отсутствии": идемпотентность — hard requirement плана, не опция. Это
      # ЖЕ прогон обязан отозвать инъекцию выше (3-я ветка реконсиляции).
      - name: Provision roles is idempotent AND revokes the injected escalation (second run)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d uk_management -v ON_ERROR_STOP=1 \
            -v migrator_pw=ci_migrator_pw2 -v bot_pw=ci_bot_pw2 \
            -v api_pw=ci_api_pw2 -v access_pw=ci_access_pw2 \
            -f scripts/provision_roles.sql
          remaining=$(psql -h localhost -U postgres -d uk_management -tAc \
            "SELECT count(*) FROM pg_auth_members m JOIN pg_roles mr ON mr.oid = m.member WHERE mr.rolname = 'ci_pr7_intruder'")
          test "$remaining" = "0" || { echo "::error::injected escalation membership survived provision_roles.sql re-run — 3rd reconciliation loop regressed"; exit 1; }
          psql -h localhost -U postgres -d uk_management -v ON_ERROR_STOP=1 -c "DROP ROLE ci_pr7_intruder;"

      - name: Assert provisioned memberships (exact set, no ADMIN OPTION, no strangers)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d uk_management -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE
            bad_count int;
          BEGIN
            SELECT count(*) INTO bad_count
            FROM pg_auth_members m
            JOIN pg_roles gr ON gr.oid = m.roleid
            JOIN pg_roles mr ON mr.oid = m.member
            WHERE (mr.rolname IN ('uk_migrator','uk_bot_runtime','uk_api_runtime','uk_access_runtime')
                   OR gr.rolname IN ('uk_migration_owner','uk_app_rw','access_app_rw'))
              AND m.admin_option = true;
            IF bad_count <> 0 THEN
              RAISE EXCEPTION 'found % membership(s) with ADMIN OPTION still granted', bad_count;
            END IF;

            SELECT count(*) INTO bad_count
            FROM pg_auth_members m
            JOIN pg_roles gr ON gr.oid = m.roleid
            JOIN pg_roles mr ON mr.oid = m.member
            WHERE mr.rolname IN ('uk_migrator','uk_bot_runtime','uk_api_runtime','uk_access_runtime')
              AND NOT (
                (mr.rolname = 'uk_migrator'       AND gr.rolname = 'uk_migration_owner') OR
                (mr.rolname = 'uk_bot_runtime'    AND gr.rolname = 'uk_app_rw') OR
                (mr.rolname = 'uk_api_runtime'    AND gr.rolname = 'uk_app_rw') OR
                (mr.rolname = 'uk_access_runtime' AND gr.rolname = 'access_app_rw')
              );
            IF bad_count <> 0 THEN
              RAISE EXCEPTION 'found % unexpected membership(s) for runtime/migrator roles', bad_count;
            END IF;

            SELECT count(*) INTO bad_count
            FROM pg_auth_members m
            JOIN pg_roles gr ON gr.oid = m.roleid
            JOIN pg_roles mr ON mr.oid = m.member
            WHERE gr.rolname IN ('uk_migration_owner','uk_app_rw','access_app_rw')
              AND NOT (
                (gr.rolname = 'uk_migration_owner' AND mr.rolname = 'uk_migrator') OR
                (gr.rolname = 'uk_app_rw'          AND mr.rolname IN ('uk_bot_runtime','uk_api_runtime')) OR
                (gr.rolname = 'access_app_rw'      AND mr.rolname = 'uk_access_runtime')
              );
            IF bad_count <> 0 THEN
              RAISE EXCEPTION 'found % stranger member(s) of owner/group roles', bad_count;
            END IF;

            -- 3-е направление: НИКТО не должен быть членом ни одной из 4
            -- LOGIN-ролей (иначе `GRANT uk_migrator TO x` дало бы x транзитивный
            -- SET ROLE до uk_migration_owner — эскалация в обход всей модели,
            -- которую первые два запроса выше не ловят: они смотрят либо "куда
            -- входят login-роли", либо "кто входит в owner/group-роли", но не
            -- "кто входит в сами login-роли").
            SELECT count(*) INTO bad_count
            FROM pg_auth_members m
            JOIN pg_roles gr ON gr.oid = m.roleid
            WHERE gr.rolname IN ('uk_migrator','uk_bot_runtime','uk_api_runtime','uk_access_runtime');
            IF bad_count <> 0 THEN
              RAISE EXCEPTION 'found % member(s) granted INTO a LOGIN role — escalation path', bad_count;
            END IF;
          END
          $$;
          SQL

      - name: Ownership transfer (scripts/dba_ownership_transfer.sql)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d uk_management -v ON_ERROR_STOP=1 \
            -f scripts/dba_ownership_transfer.sql

      # Собственно PR-7: мигратор без DDL-владения (uk_migrator) применяет
      # baseline через SET SESSION ROLE uk_migration_owner. REQUIRE_MIGRATION_OWNER=1
      # — сценарий (а) из плана: роль реально провижинена, миграция обязана пройти.
      - name: Apply migrations as uk_migrator + ACL-reconcile + drift-gate
        env:
          DATABASE_URL: "postgresql://uk_migrator:ci_migrator_pw2@localhost:5432/uk_management"
          REQUIRE_MIGRATION_OWNER: "1"
        run: |
          python -m alembic upgrade head
          python -m uk_management_bot.dbops.acl_reconcile
          python -m alembic check

      - name: Assert object ownership (SET SESSION ROLE actually took effect)
        env:
          PGPASSWORD: postgres
        run: |
          owner=$(psql -h localhost -U postgres -d uk_management -tAc \
            "SELECT string_agg(DISTINCT tableowner, ',') FROM pg_tables WHERE tablename IN ('users','access_events','alembic_version')")
          echo "owner(s) = [$owner]"
          test "$owner" = "uk_migration_owner" || { echo "::error::expected sole owner uk_migration_owner, got [$owner]"; exit 1; }

      # ACL-матрица — три группы с тремя разными уровнями привилегий
      # (0001_prc05_initial_baseline.py:1298-1337), не одна append-only группа.
      # has_table_privilege учитывает членство/наследование (uk_access_runtime
      # сама грантов не имеет — они у access_app_rw, INHERIT-роль их наследует).
      - name: Assert ACL matrix (immut / other / shared / alembic_version)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d uk_management -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            -- immut (access_events): SELECT+INSERT, без UPDATE/DELETE
            IF NOT (has_table_privilege('uk_access_runtime','access_events','SELECT')
                AND has_table_privilege('uk_access_runtime','access_events','INSERT')
                AND NOT has_table_privilege('uk_access_runtime','access_events','UPDATE')
                AND NOT has_table_privilege('uk_access_runtime','access_events','DELETE')) THEN
              RAISE EXCEPTION 'uk_access_runtime/access_events (immut) ACL mismatch';
            END IF;
            -- other (access_gates): полный CRUD
            IF NOT (has_table_privilege('uk_access_runtime','access_gates','SELECT')
                AND has_table_privilege('uk_access_runtime','access_gates','INSERT')
                AND has_table_privilege('uk_access_runtime','access_gates','UPDATE')
                AND has_table_privilege('uk_access_runtime','access_gates','DELETE')) THEN
              RAISE EXCEPTION 'uk_access_runtime/access_gates (other) ACL mismatch';
            END IF;
            -- shared (users): только SELECT для access_runtime
            IF NOT (has_table_privilege('uk_access_runtime','users','SELECT')
                AND NOT has_table_privilege('uk_access_runtime','users','INSERT')) THEN
              RAISE EXCEPTION 'uk_access_runtime/users (shared) ACL mismatch';
            END IF;
            -- shared (users): полный DML для bot/api через uk_app_rw
            IF NOT (has_table_privilege('uk_bot_runtime','users','UPDATE')
                AND has_table_privilege('uk_api_runtime','users','UPDATE')) THEN
              RAISE EXCEPTION 'uk_bot_runtime/uk_api_runtime on users (shared) ACL mismatch';
            END IF;
            -- bot/api НЕ имеют доступа к access-домену (immut/other)
            IF has_table_privilege('uk_bot_runtime','access_events','SELECT')
                OR has_table_privilege('uk_api_runtime','access_gates','SELECT') THEN
              RAISE EXCEPTION 'uk_bot_runtime/uk_api_runtime unexpectedly has access-domain privileges';
            END IF;
            -- alembic_version carve-out: только SELECT для всех трёх runtime
            IF has_table_privilege('uk_bot_runtime','alembic_version','INSERT')
                OR has_table_privilege('uk_api_runtime','alembic_version','UPDATE')
                OR has_table_privilege('uk_access_runtime','alembic_version','DELETE')
                OR NOT has_table_privilege('uk_bot_runtime','alembic_version','SELECT') THEN
              RAISE EXCEPTION 'alembic_version carve-out mismatch';
            END IF;
          END
          $$;
          SQL

      # Sequences не совпадают по имени с таблицей (identity/serial PK backing
      # sequence), поэтому не ловятся table-level has_table_privilege выше —
      # отдельная проверка. Динамически находит sequences access-domain таблиц
      # через pg_depend (та же логика, что в dba_ownership_transfer.sql и
      # acl_reconcile.py), не полагаясь на угаданное имя "<table>_id_seq".
      - name: Assert access-domain sequences are NOT exposed to uk_app_rw
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d uk_management -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE
            excluded_tables text[] := ARRAY[
              'access_events','access_decisions','manual_openings','access_audit_logs',
              'parking_zones','parking_zone_yards','access_gates','access_cameras',
              'access_barriers','edge_controllers','vehicles','vehicle_apartments','access_rules',
              'access_passes','resident_access_requests','camera_events','controller_sync_events',
              'barrier_commands','access_entry_confirmations','vehicle_presence_sessions'
            ];
            r RECORD;
            leak_count int := 0;
            seq_count int := 0;
          BEGIN
            -- deptype IN ('a', 'i'): 'a' = classic SERIAL (2 из 20 таблиц
            -- здесь), 'i' = нативная identity-колонка GENERATED ... AS
            -- IDENTITY (17 из 20 таблиц здесь). Фильтр только по 'a' — уже
            -- эмпирически подтверждённая, реально произошедшая регрессия:
            -- находил лишь 2 sequences и MOLча пропускал остальные 17
            -- (включая access_events_id_seq), при этом сам "seq_count = 0"
            -- guard ниже это не ловил (2 <> 0). Порог ужесточён до "< 15" —
            -- заведомо выше сломанного случая (2), заведомо ниже реального (19).
            FOR r IN
              SELECT s.relname
              FROM pg_class t
              JOIN pg_depend d ON d.refobjid = t.oid AND d.deptype IN ('a', 'i')
              JOIN pg_class s ON s.oid = d.objid AND s.relkind = 'S'
              WHERE t.relname = ANY(excluded_tables)
            LOOP
              seq_count := seq_count + 1;
              IF has_sequence_privilege('uk_bot_runtime', r.relname, 'SELECT')
                  OR has_sequence_privilege('uk_api_runtime', r.relname, 'SELECT')
                  OR has_sequence_privilege('uk_access_runtime', r.relname, 'USAGE') THEN
                RAISE WARNING 'access-domain sequence % leaked to uk_app_rw', r.relname;
                leak_count := leak_count + 1;
              END IF;
            END LOOP;
            IF seq_count < 15 THEN
              RAISE EXCEPTION 'found only % access-domain sequence(s) via pg_depend (expected ~19) — discovery mechanism is broken, not a real pass', seq_count;
            END IF;
            IF leak_count <> 0 THEN
              RAISE EXCEPTION '% of % access-domain sequence(s) leaked to uk_app_rw', leak_count, seq_count;
            END IF;
          END
          $$;
          SQL

      - name: Assert schema USAGE granted, CREATE not granted
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d uk_management -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT (has_schema_privilege('uk_bot_runtime','public','USAGE')
                AND has_schema_privilege('uk_api_runtime','public','USAGE')
                AND has_schema_privilege('uk_access_runtime','public','USAGE')) THEN
              RAISE EXCEPTION 'runtime role missing schema USAGE';
            END IF;
            IF has_schema_privilege('uk_bot_runtime','public','CREATE')
                OR has_schema_privilege('uk_api_runtime','public','CREATE')
                OR has_schema_privilege('uk_access_runtime','public','CREATE') THEN
              RAISE EXCEPTION 'runtime role unexpectedly has CREATE on schema public';
            END IF;
          END
          $$;
          SQL

      # Часовой: runtime-роли не могут ни создавать объекты, ни эскалировать
      # до owner'а — если хотя бы одна команда пройдёт, шаг обязан упасть.
      - name: Assert runtime roles cannot create/escalate
        env:
          PGPASSWORD: ci_bot_pw2
        run: |
          set +e
          out=$(psql -h localhost -U uk_bot_runtime -d uk_management -v ON_ERROR_STOP=1 \
            -c "CREATE TABLE pr7_escalation_probe (id int)" 2>&1)
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "::error::uk_bot_runtime was able to CREATE TABLE — least-privilege broken"
            exit 1
          fi
          echo "$out" | grep -qi "permission denied" || { echo "::error::unexpected failure: $out"; exit 1; }

          set +e
          out=$(psql -h localhost -U uk_bot_runtime -d uk_management -v ON_ERROR_STOP=1 \
            -c "SET ROLE uk_migration_owner" 2>&1)
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "::error::uk_bot_runtime was able to SET ROLE uk_migration_owner — escalation possible"
            exit 1
          fi

  images-build:
    name: images-build (docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: "type=gha,mode=max"

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          load: false
          cache-from: type=gha
          cache-to: "type=gha,mode=max"

      # PRC-04: uk-access-api — живой prod-сервис; его сборку тоже гейтим в CI,
      # чтобы поломка Dockerfile.access ловилась до деплоя. Отдельный cache-scope,
      # чтобы не тереть gha-кэш bot/api.
      - name: Build access image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.access
          push: false
          load: false
          cache-from: type=gha,scope=access
          cache-to: "type=gha,mode=max,scope=access"

  frontend:
    name: frontend (build + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # Brand-hardcode guard: сырой бренд-цвет/лого в компонентах (вместо токенов)
      # разъезжает PROFK/InfraSafe. Падает на неразрешённом совпадении.
      - name: Brand-hardcode guard
        run: npm run guard:brand

      # PRC-03 (audit #4): eslint теперь BLOCKING. Все 60 legacy-ошибок устранены
      # (no-explicit-any→unknown/типы, вынос не-компонентных экспортов, обоснованный
      # eslint-disable для намеренных react-hooks-паттернов); `npm run lint`
      # (`eslint .`) падает только на errors (0 сейчас), 8 warnings терпимы.
      - name: Lint (blocking)
        run: npm run lint

      # `npm run build` = `tsc -b && vite build` — the real typecheck + build gate
      # (дефолтный бренд InfraSafe).
      - run: npm run build

      # Вторая бренд-сборка — ловит поломки PROFK-ветки (компиляция, HTML-трансформ
      # transformIndexHtml) до прода. Тесты/линт бренд-агностичны → один раз.
      - name: Build PROFK brand variant
        run: npm run build:profk

      # TEST-068: vitest + coverage. The threshold is a ratchet floor (see
      # frontend/vitest.config.ts) raised per phase toward 80% — blocking, but
      # it can only fail on a regression below the current floor, not on the
      # not-yet-covered surface.
      - name: Tests + coverage (TEST-068 ratchet)
        run: npm run test:cov
