<svg xmlns="http://www.w3.org/2000/svg" width="300" height="500" viewBox="0 0 300 500" font-family="'Segoe UI',Roboto,Arial,sans-serif">
  <rect x="6" y="6" width="288" height="488" rx="26" fill="#ffffff" stroke="#c7ced6" stroke-width="2"/>
  <clipPath id="e4"><rect x="8" y="8" width="284" height="484" rx="24"/></clipPath>
  <g clip-path="url(#e4)">
    <rect x="8" y="8" width="284" height="484" fill="#e7ebf0"/>
    <rect x="8" y="8" width="284" height="52" fill="#5288c1"/>
    <circle cx="34" cy="34" r="15" fill="#ffffff"/>
    <text x="34" y="39" text-anchor="middle" font-size="15" fill="#5288c1" font-weight="bold">УК</text>
    <text x="58" y="30" font-size="14" fill="#ffffff" font-weight="bold">УК — бот</text>
    <text x="58" y="46" font-size="11" fill="#dbe7f5">завершение · 260706-042</text>
    <rect x="20" y="76" width="252" height="60" rx="12" fill="#ffffff"/>
    <text x="34" y="100" font-size="12.5" fill="#222">Опишите, что сделано, и</text>
    <text x="34" y="118" font-size="12.5" fill="#222">приложите фото результата.</text>
    <!-- text input -->
    <rect x="20" y="146" width="252" height="52" rx="10" fill="#f3f6f9" stroke="#c7ced6"/>
    <text x="34" y="168" font-size="12" fill="#333">Заменил смеситель, заменил</text>
    <text x="34" y="185" font-size="12" fill="#333">прокладки. Течь устранена.|</text>
    <!-- photo thumbs -->
    <rect x="20" y="210" width="56" height="56" rx="8" fill="#cbd6df"/>
    <text x="48" y="242" text-anchor="middle" font-size="20">🖼️</text>
    <rect x="82" y="210" width="56" height="56" rx="8" fill="#cbd6df"/>
    <text x="110" y="242" text-anchor="middle" font-size="20">🖼️</text>
    <rect x="144" y="210" width="56" height="56" rx="8" fill="#eef2f5" stroke="#c7ced6" stroke-dasharray="4 3"/>
    <text x="172" y="244" text-anchor="middle" font-size="22" fill="#8a8f96">＋</text>
    <text x="34" y="288" font-size="11" fill="#8a8f96">Материалы: смеситель ×1, прокладка ×2</text>
    <!-- confirm -->
    <rect x="20" y="304" width="252" height="38" rx="8" fill="#4aa15a"/>
    <text x="146" y="328" text-anchor="middle" font-size="13.5" fill="#ffffff" font-weight="bold">✅ Завершить заявку</text>
    <rect x="20" y="350" width="252" height="34" rx="8" fill="#f3f4f6" stroke="#dbe3ea"/>
    <text x="146" y="372" text-anchor="middle" font-size="12.5" fill="#8a8f96">✖️ Отмена</text>
    <rect x="20" y="398" width="252" height="46" rx="12" fill="#e3f3e6"/>
    <text x="34" y="420" font-size="12" fill="#2f7d3c">✓ Отправлено. Заявка → «Выполнена».</text>
    <text x="34" y="437" font-size="11" fill="#4a7a55">Ждёт приёмки заявителем/менеджером.</text>
  </g>
