[tool.pytest.ini_options]
asyncio_mode = "auto"
# testpaths = the colocated unit/handlers/service suite. The API + integration/
# SSOT-gate suite under tests/api and tests/services has its own sqlite
# conftests and is run as a SEPARATE pytest invocation in CI (see ci.yml) so
# the sqlite suite isn't collected together with this one. A bare `pytest`
# therefore runs only the unit suite; CI runs both.
testpaths = ["uk_management_bot"]
# uk_management_bot/ has no top-level __init__.py. Most tests live under
# uk_management_bot/tests/ (DEAD-15 moved services/utils/keyboards there), but
# some remain colocated with source (e.g. api/*/test_*.py, middlewares/test_*.py),
# so prepend import-mode derives clashing package names (api.*, middlewares.*)
# and full-suite collection errors with "ModuleNotFoundError". importlib mode
# imports each test by file path, avoiding the collision and tolerating
# duplicate basenames across packages.
addopts = "--import-mode=importlib"
# NICE-114: register custom marks so @pytest.mark.unit / .integration don't emit
# PytestUnknownMarkWarning. See docs/development/testing-conventions.md.
markers = [
    "unit: fast hermetic unit test (no DB/network/external I/O)",
    "integration: test touching the DB or external services",
]

[tool.coverage.run]
source = ["uk_management_bot"]
omit = [
    "uk_management_bot/tests/*",
    "uk_management_bot/handlers/*",
    "uk_management_bot/venv/*",
    "*/__pycache__/*",
    "*/test_*.py",
]

[tool.coverage.report]
show_missing = false
skip_empty = true
precision = 1

# PRAC-01: ruff is the enforced Python linter. CI runs it on CHANGED *.py files
# (blocking) so new/touched code stays clean without a big-bang cleanup of the
# ~670 pre-existing whole-repo violations (tracked as a separate follow-up).
[tool.ruff]
line-length = 88
target-version = "py311"
# PRAC-01-FU scope decision (owner, 2026-06-14): enforce E/F on bot/API only.
# media_service/scripts/docs carry ~169 E/F deferred to PRAC-01-FU2.
# force-exclude makes these apply even when paths are passed explicitly (CI / pre-commit).
extend-exclude = ["media_service", "scripts", "docs", "resource-accounting"]
force-exclude = true

[tool.ruff.lint]
# Mirror the legacy flake8 baseline (pycodestyle E + pyflakes F). E501
# (line-too-long) is delegated to black (the formatter); E203 is black-compatible.
select = ["E", "F"]
ignore = ["E203", "E501"]

[tool.ruff.lint.per-file-ignores]
# Deliberate late module-level imports (NOT sloppy placement):
# - api/main.py: routers/reconcilers imported after the FastAPI app + lifespan
#   are set up (entrypoint wiring); moving them risks import cycles.
# - database/init_admin.py: imports come after sys.path.insert() bootstrap, so
#   they must stay below it.
"uk_management_bot/api/main.py" = ["E402"]
"uk_management_bot/database/init_admin.py" = ["E402"]
