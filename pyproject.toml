[tool.pytest.ini_options]
asyncio_mode = "auto"
# testpaths = the colocated unit/handlers/service suite. The API + integration/
# SSOT-gate suite under tests/api and tests/services has its own sqlite
# conftests and is run as a SEPARATE pytest invocation in CI (see ci.yml) so
# the sqlite suite isn't collected together with this one. A bare `pytest`
# therefore runs only the unit suite; CI runs both.
testpaths = ["uk_management_bot"]
# uk_management_bot/ has no top-level __init__.py and tests are colocated with
# source (e.g. services/test_*.py), so prepend import-mode derives clashing
# package names (services.*, api.*) and full-suite collection errors with
# "ModuleNotFoundError". importlib mode imports each test by file path, which
# avoids the collision and tolerates duplicate basenames across packages.
addopts = "--import-mode=importlib"

[tool.coverage.run]
source = ["uk_management_bot"]
omit = [
    "uk_management_bot/tests/*",
    "uk_management_bot/handlers/*",
    "uk_management_bot/venv/*",
    "*/__pycache__/*",
    "*/test_*.py",
]

[tool.coverage.report]
show_missing = false
skip_empty = true
precision = 1

# PRAC-01: ruff is the enforced Python linter. CI runs it on CHANGED *.py files
# (blocking) so new/touched code stays clean without a big-bang cleanup of the
# ~670 pre-existing whole-repo violations (tracked as a separate follow-up).
[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
# Mirror the legacy flake8 baseline (pycodestyle E + pyflakes F). E501
# (line-too-long) is delegated to black (the formatter); E203 is black-compatible.
select = ["E", "F"]
ignore = ["E203", "E501"]
