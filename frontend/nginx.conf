# Custom log format for WS — strip query string to avoid token leaks
# Must be at http{} level (conf.d/ is included inside http{})
log_format ws_format '$remote_addr - $remote_user [$time_local] "$request_method $uri" $status';

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # CSP is set at Caddy layer — do NOT duplicate here
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Prevent caching index.html (JS bundles have content hashes)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        access_log /var/log/nginx/ws.log ws_format;
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }
}
