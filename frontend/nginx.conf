server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # CSP is set at the external infrasafe-nginx layer for /uk/* — do NOT duplicate here
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Hashed assets (immutable). External infrasafe-nginx strips the /uk/ prefix
    # before forwarding, so we serve /assets/, not /uk/assets/.
    location ^~ /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Prevent caching index.html (JS bundles have content hashes)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
