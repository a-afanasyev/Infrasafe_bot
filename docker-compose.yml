# docker-compose.yml для UK Management Bot
# Этот файл описывает все сервисы, необходимые для работы приложения
# version: '3.8'  # Устарело в новых версиях Docker Compose

# Определяем сервисы (контейнеры)
services:
  # Основное приложение - Telegram бот
  app:
    # Используем локальный Dockerfile для сборки образа
    build: .
    
    # Имя контейнера для удобства
    container_name: uk-management-bot
    
    # Перезапуск контейнера при сбоях
    restart: unless-stopped

    # IPv4-only: в Узбекистане нет рабочего IPv6-egress. Без этого getaddrinfo
    # отдаёт AAAA (api.telegram.org резолвится в IPv6) и aiogram/httpx виснут на
    # TCP-connect → TelegramNetworkError. disable_ipv6 убирает IPv6 с интерфейса,
    # и getaddrinfo (AI_ADDRCONFIG) возвращает только IPv4 — для всего egress.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1

    # Команда запуска бота
    command: python -m uk_management_bot.main
    
    # Переменные окружения
    # Используем файл .env для конфиденциальных данных
    env_file:
      - .env
    
    # Переменные окружения для подключения к сервисам
    environment:
      # Подключение к PostgreSQL
      - DATABASE_URL=postgresql://${POSTGRES_USER:-uk_bot}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-uk_management}
      
      # Подключение к Redis
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      
      # Настройки логирования
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    
    # Зависимости от других сервисов
    # Приложение запустится только после готовности БД и Redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    # Сетевые настройки
    networks:
      - uk-network
    
    # Health check для проверки состояния приложения
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API сервис (FastAPI + uvicorn)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: uk-management-api
    restart: unless-stopped
    # IPv4-only (см. комментарий у app): UZ без IPv6-egress; InfraSafe-вебхуки и
    # любой внешний HTTP из API должны идти по IPv4.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-uk_bot}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-uk_management}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # REDIS_PUBSUB_URL intentionally NOT set here — settings.REDIS_PUBSUB_URL_RESOLVED
      # derives it from REDIS_URL (preserving auth). Hardcoding here without password
      # broke pubsub when REDIS_PASSWORD was enabled. See PR-B in spec
      # 2026-05-19-uk-infrasafe-webhook-hardening. Override via env if you need
      # a separate Redis instance for pubsub.
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - FRONTEND_URL=http://localhost:3002
      - INFRASAFE_WEBHOOK_ENABLED=${INFRASAFE_WEBHOOK_ENABLED:-false}
      - INFRASAFE_WEBHOOK_URL=${INFRASAFE_WEBHOOK_URL:-}
      - INFRASAFE_WEBHOOK_SECRET=${INFRASAFE_WEBHOOK_SECRET:-}
    ports:
      - "127.0.0.1:8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Access API сервис (FastAPI + uvicorn) — домен контроля доступа.
  # Отдельный сервис/образ (ТЗ §1), но общая инфраструктура postgres/redis.
  # Пилот (ТЗ §14.2): ingestion/decision/edge/operator API + health/latency-метрики.
  access-api:
    build:
      context: .
      dockerfile: Dockerfile.access
    container_name: uk-access-api
    restart: unless-stopped
    # IPv4-only (см. комментарий у app): UZ без IPv6-egress.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    env_file:
      - .env
    environment:
      # Общая БД и Redis с основным API (ТЗ §3.1). Миграции применяет
      # uk-management-api на той же БД — access-api их НЕ гоняет.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-uk_bot}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-uk_management}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      # Multi-worker-безопасные backend'ы (§9.1 anti-replay, §9.6 live-события):
      # nonce-store и брокер событий — на общем Redis, а не in-process. Без этого
      # на нескольких воркерах replay проходит на другом воркере, а WS-клиент не
      # видит событие чужого воркера. Значения не секретны — заданы прямо здесь.
      - ACCESS_NONCE_BACKEND=redis
      - ACCESS_EVENT_BROKER=redis
      # Обязательные секреты домена (код падает RuntimeError при их отсутствии):
      #   ACCESS_SNAPSHOT_SIGNING_SEED — приватный сид Ed25519 подписи offline-snapshot (§8.2);
      #   ACCESS_DEVICE_HMAC_SEED      — сид пер-устройственного HMAC device-auth (§9.1);
      #   ACCESS_PHOTO_URL_SECRET      — секрет HMAC-подписи signed-URL фото (§11);
      #   ACCESS_CODE_SECRET           — секрет HMAC одноразовых гостевых кодов (§9.3).
      # Берутся из .env через env_file выше (общий дефолт в коде запрещён §9.1/§11);
      # как сгенерировать — см. env.example. Здесь НЕ дублируем интерполяцией, чтобы
      # пустой shell-var не перетёр значение из .env.
      #
      # Интеграция с медиа-сервисом (§11, §10.2): фото проезда грузятся в отдельный
      # канал ВНЕ пути решения и отдаются по media://-ссылке. Клиент ленивый —
      # access-api стартует и без этих переменных (ошибка только при работе с фото).
      #   MEDIA_SERVICE_URL — базовый URL медиа-сервиса (compose-DNS, порт 8000);
      #   MEDIA_API_KEY     — X-API-Key медиа-сервиса (секрет → из .env, не хардкод).
      - MEDIA_SERVICE_URL=${MEDIA_SERVICE_URL:-http://media-service:8000}
    # Отдельный host-порт (uk-management-api занимает 8085); контейнерный порт 8080.
    # Дефолт 8087: на shared-деплое с InfraSafe порт 8086 занят influxdb. Edge
    # ходит в access-api:8080 по docker-сети, host-порт нужен лишь для localhost.
    ports:
      - "127.0.0.1:${ACCESS_API_HOST_PORT:-8087}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # База данных PostgreSQL
  postgres:
    # Используем официальный образ PostgreSQL
    image: postgres:15-alpine
    
    # Имя контейнера
    container_name: uk-postgres
    
    # Перезапуск при сбоях
    restart: unless-stopped
    
    # Переменные окружения для настройки БД
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-uk_management}
      - POSTGRES_USER=${POSTGRES_USER:-uk_bot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      
      # Настройки производительности
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    
    # Тома для хранения данных БД
    # Данные сохраняются между перезапусками контейнеров
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
      # Инициализация БД - SQL скрипт
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01-init_postgres.sql:ro
      
      # Инициализация БД - Bash скрипт
      - ./scripts/init_postgres.sh:/docker-entrypoint-initdb.d/02-init_postgres.sh:ro
    
    # Сетевые настройки
    networks:
      - uk-network
    
    # Health check для проверки готовности БД
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uk_bot -d uk_management"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    # Открываем порт для подключения (только для разработки)
    ports:
      - "127.0.0.1:5432:5432"

  # Redis для кэширования и rate limiting
  redis:
    # Используем официальный образ Redis
    image: redis:7-alpine
    
    # Имя контейнера
    container_name: uk-redis
    
    # Перезапуск при сбоях
    restart: unless-stopped
    
    # Конфигурация Redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    
    # Тома для хранения данных Redis
    volumes:
      - redis_data:/data
    
    # Сетевые настройки
    networks:
      - uk-network
    
    # Health check для проверки готовности Redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    
    # Открываем порт для подключения (только для разработки)
    ports:
      - "127.0.0.1:6379:6379"

  # Frontend (React + nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uk-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:80"
    depends_on:
      - api
    networks:
      - uk-network

# Определяем тома для хранения данных
volumes:
  # Том для данных PostgreSQL
  postgres_data:
    driver: local
  
  # Том для данных Redis
  redis_data:
    driver: local

# Определяем сеть для связи между сервисами
networks:
  uk-network:
    driver: bridge
    # Реконсиляция прод-дрейфа (PR-10): фиксированное имя сети — без префикса
    # каталога compose-проекта; так сеть называется на проде.
    name: uk-network
