# docker-compose.yml для UK Management Bot
# Этот файл описывает все сервисы, необходимые для работы приложения
# version: '3.8'  # Устарело в новых версиях Docker Compose

# Определяем сервисы (контейнеры)
services:
  # Основное приложение - Telegram бот
  app:
    # Используем локальный Dockerfile для сборки образа
    build: .
    
    # Имя контейнера для удобства
    container_name: uk-management-bot
    
    # Перезапуск контейнера при сбоях
    restart: unless-stopped

    # IPv4-only: в Узбекистане нет рабочего IPv6-egress. Без этого getaddrinfo
    # отдаёт AAAA (api.telegram.org резолвится в IPv6) и aiogram/httpx виснут на
    # TCP-connect → TelegramNetworkError. disable_ipv6 убирает IPv6 с интерфейса,
    # и getaddrinfo (AI_ADDRCONFIG) возвращает только IPv4 — для всего egress.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1

    # Команда запуска бота
    command: python -m uk_management_bot.main
    
    # Переменные окружения
    # .env — общие несекретные-для-роли значения; .env.bot — DATABASE_URL под
    # ролью uk_bot_runtime (PR-7/F-01, генерируется provision-roles). Порядок
    # важен: более поздний файл дополняет/переопределяет более ранний.
    env_file:
      - .env
      - ./.secrets/roles/.env.bot

    # Переменные окружения для подключения к сервисам
    environment:
      # PR-7 (F-01): DATABASE_URL приходит ИСКЛЮЧИТЕЛЬНО из
      # ./.secrets/roles/.env.bot (env_file выше) — не дублировать здесь:
      # environment: имеет более высокий приоритет, чем env_file, и молча
      # перезаписал бы role-специфичный DATABASE_URL общим POSTGRES_USER/PASSWORD.
      # Подключение к Redis (ARCH-106: REDIS_URL строится из REDIS_PASSWORD, не берётся
      # целиком из .env — иначе Doppler-cutover REDIS_PASSWORD не давал бы эффекта здесь)
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0

      # Настройки логирования
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1

      # ARCH-106 (Doppler cutover, Phase 1): секреты приходят из Doppler через
      # `doppler run -- docker compose ...` (см. .claude/skills/uk-deploy/SKILL.md), не из
      # env_file(.env) — :? делает отсутствие явной ошибкой вместо тихого пустого значения.
      - BOT_TOKEN=${BOT_TOKEN:?BOT_TOKEN is required — set it in Doppler (project uk-management)}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required — set it in Doppler (project uk-management)}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required — set it in Doppler (project uk-management)}
      - INVITE_SECRET=${INVITE_SECRET:?INVITE_SECRET is required — set it in Doppler (project uk-management)}
      # Медиа-клиент бота (uk_management_bot/integrations/__init__.py) — опционален по коду
      # (settings.py: os.getenv(..., "")), fallback MEDIA_SERVICE_API_KEY || MEDIA_API_KEY:
      - MEDIA_SERVICE_API_KEY=${MEDIA_SERVICE_API_KEY:-}
      - MEDIA_API_KEY=${MEDIA_API_KEY:-}

    # Зависимости от других сервисов
    # Приложение запустится только после готовности БД и Redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    # Сетевые настройки
    networks:
      - uk-network

    # Health check для проверки состояния приложения
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API сервис (FastAPI + uvicorn)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: uk-management-api
    restart: unless-stopped
    # [F-03] За edge nginx /uk/api/ рерайтится в /api/ (префикс срезан) и терминирует
    # TLS, поэтому uvicorn без trusted-proxy строит redirect-Location как http://.../api
    # (теряет https и /uk). Прод задаёт в .env FORWARDED_ALLOW_IPS (CIDR edge-сети —
    # uvicorn доверяет X-Forwarded-Proto) и API_ROOT_PATH=/uk (возвращает префикс).
    # Dev: обе переменные пусты → --forwarded-allow-ips 127.0.0.1, без --root-path.
    # $$ экранирует интерполяцию compose — раскрывает shell из env_file (.env).
    command:
      - sh
      - -c
      - >-
        exec uvicorn uk_management_bot.api.main:app --host 0.0.0.0 --port 8080 --workers 2
        --proxy-headers --forwarded-allow-ips "$${FORWARDED_ALLOW_IPS:-127.0.0.1}"
        $${API_ROOT_PATH:+--root-path "$$API_ROOT_PATH"}
    # IPv4-only (см. комментарий у app): UZ без IPv6-egress; InfraSafe-вебхуки и
    # любой внешний HTTP из API должны идти по IPv4.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    env_file:
      - .env
      - ./.secrets/roles/.env.api
    environment:
      # PR-7 (F-01): DATABASE_URL приходит ИСКЛЮЧИТЕЛЬНО из
      # ./.secrets/roles/.env.api (env_file выше), под ролью uk_api_runtime —
      # не дублировать здесь (см. комментарий у сервиса app).
      # ARCH-106: REDIS_URL строится из REDIS_PASSWORD (Doppler), не берётся целиком из .env.
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      # REDIS_PUBSUB_URL intentionally NOT set here — settings.REDIS_PUBSUB_URL_RESOLVED
      # derives it from REDIS_URL (preserving auth). Hardcoding here without password
      # broke pubsub when REDIS_PASSWORD was enabled. See PR-B in spec
      # 2026-05-19-uk-infrasafe-webhook-hardening. Override via env if you need
      # a separate Redis instance for pubsub.
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - FRONTEND_URL=http://localhost:3002
      - INFRASAFE_WEBHOOK_ENABLED=${INFRASAFE_WEBHOOK_ENABLED:-false}
      - INFRASAFE_WEBHOOK_URL=${INFRASAFE_WEBHOOK_URL:-}
      - INFRASAFE_WEBHOOK_SECRET=${INFRASAFE_WEBHOOK_SECRET:-}
      # ARCH-106 (Doppler cutover, Phase 1) — обязательные (см. app для объяснения :?):
      - BOT_TOKEN=${BOT_TOKEN:?BOT_TOKEN is required — set it in Doppler (project uk-management)}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required — set it in Doppler (project uk-management)}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required — set it in Doppler (project uk-management)}
      - INVITE_SECRET=${INVITE_SECRET:?INVITE_SECRET is required — set it in Doppler (project uk-management)}
      # Опциональные (settings.py default ""), функционально нужны только api:
      - HEALTH_METRICS_TOKEN=${HEALTH_METRICS_TOKEN:-}
      - INFRASAFE_INVENTORY_TOKEN=${INFRASAFE_INVENTORY_TOKEN:-}
      - UK_WEBHOOK_SECRET=${UK_WEBHOOK_SECRET:-}
      - RESOURCE_SERVICE_TOKEN=${RESOURCE_SERVICE_TOKEN:-}
      - MEDIA_SERVICE_API_KEY=${MEDIA_SERVICE_API_KEY:-}
      - MEDIA_API_KEY=${MEDIA_API_KEY:-}
    ports:
      - "127.0.0.1:8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Access API сервис (FastAPI + uvicorn) — домен контроля доступа.
  # Отдельный сервис/образ (ТЗ §1), но общая инфраструктура postgres/redis.
  # Пилот (ТЗ §14.2): ingestion/decision/edge/operator API + health/latency-метрики.
  access-api:
    build:
      context: .
      dockerfile: Dockerfile.access
    container_name: uk-access-api
    restart: unless-stopped
    # [F-03] Тот же edge /uk/api/v1/access/ rewrite → те же redirect-флаги, что у api.
    # Access-api без entrypoint-миграций (Dockerfile.access), CMD --factory --workers 1.
    command:
      - sh
      - -c
      - >-
        exec uvicorn access_control.app.main:create_app --factory --host 0.0.0.0 --port 8080 --workers 1
        --proxy-headers --forwarded-allow-ips "$${FORWARDED_ALLOW_IPS:-127.0.0.1}"
        $${API_ROOT_PATH:+--root-path "$$API_ROOT_PATH"}
    # IPv4-only (см. комментарий у app): UZ без IPv6-egress.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    env_file:
      - .env
      - ./.secrets/roles/.env.access
    environment:
      # Общая БД и Redis с основным API (ТЗ §3.1). Миграции применяет
      # uk-management-api на той же БД — access-api их НЕ гоняет.
      # PR-7 (F-01): DATABASE_URL приходит ИСКЛЮЧИТЕЛЬНО из
      # ./.secrets/roles/.env.access (env_file выше), под ролью
      # uk_access_runtime — не дублировать здесь.
      # ARCH-106: REDIS_URL строится из REDIS_PASSWORD (Doppler), не берётся целиком из .env.
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      # Multi-worker-безопасные backend'ы (§9.1 anti-replay, §9.6 live-события):
      # nonce-store и брокер событий — на общем Redis, а не in-process. Без этого
      # на нескольких воркерах replay проходит на другом воркере, а WS-клиент не
      # видит событие чужого воркера. Значения не секретны — заданы прямо здесь.
      - ACCESS_NONCE_BACKEND=redis
      - ACCESS_EVENT_BROKER=redis
      # Обязательные секреты домена (код падает RuntimeError при их отсутствии) — ARCH-106
      # (Doppler cutover, Phase 1): значение приходит из Doppler через `doppler run --`,
      # :? делает отсутствие явной ошибкой при деплое, а не рантайм-RuntimeError позже:
      #   ACCESS_SNAPSHOT_SIGNING_SEED — приватный сид Ed25519 подписи offline-snapshot (§8.2);
      #   ACCESS_DEVICE_HMAC_SEED      — сид пер-устройственного HMAC device-auth (§9.1);
      #   ACCESS_PHOTO_URL_SECRET      — секрет HMAC-подписи signed-URL фото (§11);
      #   ACCESS_CODE_SECRET           — секрет HMAC одноразовых гостевых кодов (§9.3).
      - ACCESS_SNAPSHOT_SIGNING_SEED=${ACCESS_SNAPSHOT_SIGNING_SEED:?ACCESS_SNAPSHOT_SIGNING_SEED is required — set it in Doppler (project uk-management)}
      - ACCESS_DEVICE_HMAC_SEED=${ACCESS_DEVICE_HMAC_SEED:?ACCESS_DEVICE_HMAC_SEED is required — set it in Doppler (project uk-management)}
      - ACCESS_PHOTO_URL_SECRET=${ACCESS_PHOTO_URL_SECRET:?ACCESS_PHOTO_URL_SECRET is required — set it in Doppler (project uk-management)}
      - ACCESS_CODE_SECRET=${ACCESS_CODE_SECRET:?ACCESS_CODE_SECRET is required — set it in Doppler (project uk-management)}
      # Общие обязательные секреты (settings.py, см. app/api) — access-api их транзитивно
      # импортирует через _docs_enabled() (ARCH-106 план, «Ключевая находка»):
      - BOT_TOKEN=${BOT_TOKEN:?BOT_TOKEN is required — set it in Doppler (project uk-management)}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required — set it in Doppler (project uk-management)}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required — set it in Doppler (project uk-management)}
      - INVITE_SECRET=${INVITE_SECRET:?INVITE_SECRET is required — set it in Doppler (project uk-management)}
      #
      # Интеграция с медиа-сервисом (§11, §10.2): фото проезда грузятся в отдельный
      # канал ВНЕ пути решения и отдаются по media://-ссылке. Клиент ленивый —
      # access-api стартует и без этих переменных (ошибка только при работе с фото).
      #   MEDIA_SERVICE_URL — базовый URL медиа-сервиса (compose-DNS, порт 8000);
      #   MEDIA_API_KEY     — X-API-Key медиа-сервиса (Doppler, опционален по коду).
      - MEDIA_SERVICE_URL=${MEDIA_SERVICE_URL:-http://media-service:8000}
      - MEDIA_API_KEY=${MEDIA_API_KEY:-}
    # Отдельный host-порт (uk-management-api занимает 8085); контейнерный порт 8080.
    # Дефолт 8087: на shared-деплое с InfraSafe порт 8086 занят influxdb. Edge
    # ходит в access-api:8080 по docker-сети, host-порт нужен лишь для localhost.
    ports:
      - "127.0.0.1:${ACCESS_API_HOST_PORT:-8087}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # База данных PostgreSQL
  postgres:
    # Используем официальный образ PostgreSQL
    image: postgres:15-alpine
    
    # Имя контейнера
    container_name: uk-postgres
    
    # Перезапуск при сбоях
    restart: unless-stopped
    
    # PR-7 (F-01): admin/superuser credentials — отдельный файл, НЕ общий .env,
    # чтобы app/api/access-api (у которых свой env_file: [.env, .env.<role>])
    # физически не могли увидеть суперюзер-пароль. Official postgres:15-alpine
    # image читает POSTGRES_USER/PASSWORD/DB/INITDB_ARGS как обычные env-переменные
    # контейнера (docker-entrypoint.sh) — Compose-level ${...}-интерполяция здесь
    # не нужна. См. .env.postgres.example для набора переменных этого файла.
    env_file:
      - .env.postgres

    # Тома для хранения данных БД
    # Данные сохраняются между перезапусками контейнеров
    volumes:
      - postgres_data:/var/lib/postgresql/data

      # Инициализация БД - SQL скрипт (только extensions + trigger function).
      # init_postgres.sh (bash-companion) убран: его единственная функция —
      # явный GRANT $POSTGRES_USER — избыточна (официальный образ и так делает
      # $POSTGRES_USER суперпользователем при bootstrap) и после PR-7
      # концептуально неверна ($POSTGRES_USER больше не app-facing DML-роль).
      # Весь role-wiring теперь идёт через сервис provision-roles ниже.
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01-init_postgres.sql:ro

    # Сетевые настройки
    networks:
      - uk-network

    # Health check для проверки готовности БД
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    # Открываем порт для подключения (только для разработки)
    ports:
      - "127.0.0.1:5432:5432"

  # PR-7 (F-01): one-shot provisioning ролей/паролей (uk_migration_owner,
  # uk_app_rw, access_app_rw, uk_migrator, uk_bot_runtime, uk_api_runtime,
  # uk_access_runtime). НЕ docker-entrypoint-initdb.d — подключается по сети
  # ПОСЛЕ того, как postgres уже healthy, одинаково для fresh-install и DBA
  # rollout. profiles: ["tools"] — не создаётся bare `docker compose up -d`
  # (без явного списка сервисов/--profile), только `docker compose run`.
  # Пароли генерирует сам provision_roles.sh ВНУТРИ контейнера (openssl) — не
  # передаются через -e/host shell, чтобы не светиться в `ps aux`/`docker
  # inspect` на время инвокации.
  # DEPLOY_UID/DEPLOY_GID — ОБЯЗАТЕЛЬНЫЕ, тот же host-аккаунт, что выполняет
  # остальной деплой (`export DEPLOY_UID=$(id -u) DEPLOY_GID=$(id -g)` перед
  # вызовом) — без них Compose (не будучи `:?`-guarded) молча подставил бы
  # пустую строку, и `user: ":"` резолвится в root:root, а сгенерированные
  # `.secrets/roles/.env.*` окажутся root-owned вместо владения deploy-аккаунтом.
  # Инвокация — ОБЯЗАТЕЛЬНО с --name (docker compose run игнорирует
  # container_name: сервиса, генерирует случайное имя):
  #   docker compose run --rm --name uk-provision-roles provision-roles
  provision-roles:
    image: postgres:15-alpine
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - uk-network
    env_file:
      - .env.postgres
    environment:
      RUNTIME_DB_HOST: postgres
      DEPLOY_UID: ${DEPLOY_UID:?DEPLOY_UID is required — export DEPLOY_UID=$(id -u) before running provision-roles}
      DEPLOY_GID: ${DEPLOY_GID:?DEPLOY_GID is required — export DEPLOY_GID=$(id -g) before running provision-roles}
    user: "${DEPLOY_UID:?DEPLOY_UID is required}:${DEPLOY_GID:?DEPLOY_GID is required}"
    volumes:
      - ./scripts/provision_roles.sh:/provision_roles.sh:ro
      - ./scripts/provision_roles.sql:/provision_roles.sql:ro
      - ./.secrets/roles:/output
    entrypoint: ["/bin/sh", "/provision_roles.sh"]

  # PR-7 (F-01): one-shot Alembic migration job — собирается из Dockerfile.api,
  # но с ОТДЕЛЬНЫМ entrypoint (entrypoint-migrate.sh — реально гоняет
  # `alembic upgrade head`; entrypoint.sh api-сервиса теперь read-only preflight
  # и убил бы этот job на устаревшей схеме до того, как он успеет её обновить).
  # profiles: ["tools"] — не запускается bare `up -d`. Инвокация:
  #   docker compose run --rm --name uk-migrate migrate
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    profiles: ["tools"]
    entrypoint: ["/app/entrypoint-migrate.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - uk-network
    env_file:
      - .env
      - ./.secrets/roles/.env.migrate
    environment:
      # Только migrate и этот job обязаны требовать fail-closed переключение
      # роли — api/app/access-api эту переменную не используют (не гоняют Alembic).
      - REQUIRE_MIGRATION_OWNER=1
      # ARCH-106 (Doppler cutover, Phase 1): migrate транзитивно импортирует
      # uk_management_bot.config.settings через alembic/env.py → database/session.py —
      # эта эагерная production-валидация требует те же 4 переменные, что app/api/access-api
      # (см. ARCH-106 план, «Ключевая находка» — полная развязка вне охвата Phase 1):
      - BOT_TOKEN=${BOT_TOKEN:?BOT_TOKEN is required — set it in Doppler (project uk-management)}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required — set it in Doppler (project uk-management)}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required — set it in Doppler (project uk-management)}
      - INVITE_SECRET=${INVITE_SECRET:?INVITE_SECRET is required — set it in Doppler (project uk-management)}

  # Redis для кэширования и rate limiting
  redis:
    # Используем официальный образ Redis
    image: redis:7-alpine
    
    # Имя контейнера
    container_name: uk-redis
    
    # Перезапуск при сбоях
    restart: unless-stopped
    
    # Конфигурация Redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    
    # Тома для хранения данных Redis
    volumes:
      - redis_data:/data
    
    # Сетевые настройки
    networks:
      - uk-network
    
    # Health check для проверки готовности Redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    
    # Открываем порт для подключения (только для разработки)
    ports:
      - "127.0.0.1:6379:6379"

  # Frontend (React + nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # DARK-гейт раздела «Учёт ресурсов»: пусто = OFF (dev/CI), прод .env ставит true.
        VITE_RESOURCES_ENABLED: "${VITE_RESOURCES_ENABLED:-}"
    container_name: uk-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:80"
    depends_on:
      - api
    networks:
      - uk-network

  # Сервис «Учёт ресурсов» (resource-api) — внесён в монорепо UK (был отдельный
  # стек ~/uk-resource). Своя БД resource-postgres (postgres:16, свой том). edge
  # проксирует /uk/api/resource/ → resource-api:8100; s2s uk-management-api →
  # resource-api.internal:8100 (алиас под SSRF-гард).
  resource-postgres:
    image: postgres:16-alpine
    container_name: uk-resource-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${RESOURCE_POSTGRES_USER:-resource}
      - POSTGRES_PASSWORD=${RESOURCE_POSTGRES_PASSWORD:?RESOURCE_POSTGRES_PASSWORD is required — set it in Doppler (project uk-management)}
      - POSTGRES_DB=${RESOURCE_POSTGRES_DB:-resource_accounting}
    volumes:
      - resource_pg_data:/var/lib/postgresql/data
    networks:
      - uk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 10

  resource-api:
    build: ./resource-accounting/backend
    container_name: uk-resource-api
    restart: unless-stopped
    environment:
      - RESOURCE_DATABASE_URL=postgresql+psycopg2://${RESOURCE_POSTGRES_USER:-resource}:${RESOURCE_POSTGRES_PASSWORD}@resource-postgres:5432/${RESOURCE_POSTGRES_DB:-resource_accounting}
      - RESOURCE_ENVIRONMENT=production
      - RESOURCE_SESSION_SECRET=${RESOURCE_SESSION_SECRET:?RESOURCE_SESSION_SECRET is required — set it in Doppler (project uk-management)}
      - RESOURCE_SERVICE_TOKEN=${RESOURCE_SERVICE_TOKEN:?RESOURCE_SERVICE_TOKEN is required (shared with UK backend) — set it in Doppler (project uk-management)}
      - RESOURCE_COOKIE_SECURE=true
      - RESOURCE_DEV_AUTH_ENABLED=false
      - RESOURCE_RATE_LIMIT_ENABLED=true
      - RESOURCE_CORS_ORIGINS=${RESOURCE_CORS_ORIGINS:-https://infrasafe.uz}
      - RESOURCE_FRAME_ANCESTOR=${RESOURCE_FRAME_ANCESTOR:-https://infrasafe.uz}
    ports:
      - "127.0.0.1:${RESOURCE_API_HOST_PORT:-8100}:8100"
    depends_on:
      resource-postgres:
        condition: service_healthy
    networks:
      uk-network:
        aliases:
          - resource-api
          - resource-api.internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  resource-worker:
    build: ./resource-accounting/backend
    container_name: uk-resource-worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    entrypoint: []
    environment:
      - RESOURCE_DATABASE_URL=postgresql+psycopg2://${RESOURCE_POSTGRES_USER:-resource}:${RESOURCE_POSTGRES_PASSWORD}@resource-postgres:5432/${RESOURCE_POSTGRES_DB:-resource_accounting}
      - RESOURCE_ENVIRONMENT=production
      # ARCH-106: resource-worker раньше не имел :?-гарда на эти два — тихая пустая
      # подстановка вместо явной ошибки при отсутствующем секрете (см. план, категория A).
      - RESOURCE_SESSION_SECRET=${RESOURCE_SESSION_SECRET:?RESOURCE_SESSION_SECRET is required — set it in Doppler (project uk-management)}
      - RESOURCE_SERVICE_TOKEN=${RESOURCE_SERVICE_TOKEN:?RESOURCE_SERVICE_TOKEN is required (shared with UK backend) — set it in Doppler (project uk-management)}
      - RESOURCE_COOKIE_SECURE=true
      - RESOURCE_DEV_AUTH_ENABLED=false
    depends_on:
      resource-postgres:
        condition: service_healthy
      resource-api:
        condition: service_healthy
    networks:
      - uk-network

# Определяем тома для хранения данных
volumes:
  # Том для данных PostgreSQL
  postgres_data:
    driver: local

  # Том для данных Redis
  redis_data:
    driver: local

  # Переиспользуем существующий том resource-БД (данные!). На 105 .env:
  # RESOURCE_PG_VOLUME=resource-infrasafe_resource_pg_data
  resource_pg_data:
    name: ${RESOURCE_PG_VOLUME:-uk_resource_pg_data}

# Определяем сеть для связи между сервисами
networks:
  uk-network:
    driver: bridge
    # Реконсиляция прод-дрейфа (PR-10): фиксированное имя сети — без префикса
    # каталога compose-проекта; так сеть называется на проде.
    name: uk-network
