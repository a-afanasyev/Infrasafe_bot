# UK Management — Production Docker Compose
# Usage: docker compose -f docker-compose.production.yml up -d
# Requires: .env with all variables from .env.production.template

services:
  app:
    build: .
    container_name: uk-management-bot
    restart: always
    command: python -m uk_management_bot.main
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_PUBSUB_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      api: { condition: service_healthy }
    networks: [uk-network]
    deploy:
      resources:
        limits: { memory: 512M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: uk-management-api
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_PUBSUB_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - FRONTEND_URL=${FRONTEND_URL}
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - INFRASAFE_WEBHOOK_ENABLED=${INFRASAFE_WEBHOOK_ENABLED:-false}
      - INFRASAFE_WEBHOOK_URL=${INFRASAFE_WEBHOOK_URL:-}
      - INFRASAFE_WEBHOOK_SECRET=${INFRASAFE_WEBHOOK_SECRET:-}
    # No port exposure — Caddy proxies
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [uk-network]
    deploy:
      resources:
        limits: { memory: 512M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uk-frontend
    restart: always
    # No port exposure — Caddy proxies
    depends_on: [api]
    networks: [uk-network]
    deploy:
      resources:
        limits: { memory: 128M }
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "3" }

  postgres:
    image: postgres:15-alpine
    container_name: uk-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01-init_postgres.sql:ro
      - ./scripts/init_postgres.sh:/docker-entrypoint-initdb.d/02-init_postgres.sh:ro
    # No port exposure — internal only
    networks: [uk-network]
    deploy:
      resources:
        limits: { memory: 512M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: uk-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # No port exposure — internal only
    networks: [uk-network]
    deploy:
      resources:
        limits: { memory: 128M }
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "3" }
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: uk-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [api, frontend]
    networks: [uk-network]
    deploy:
      resources:
        limits: { memory: 128M }
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "3" }

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  uk-network:
    driver: bridge
