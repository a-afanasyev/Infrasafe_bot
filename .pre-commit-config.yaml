repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black
        language_version: python3.11

  # PRAC-01: ruff supersedes flake8 (same E+F rules) and is the linter enforced
  # in CI. Config lives in pyproject.toml [tool.ruff]. --fix applies safe autofixes.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        # PRC-02 (audit #4): `types-all` — заброшенный/deprecated мета-пакет,
        # ломал установку хука. `--ignore-missing-imports` уже игнорирует
        # отсутствующие сторонние стабы, поэтому доп-зависимости не нужны.
        # Флаги согласованы с CI-джобой mypy (обход коллизии имён в tests).
        args: [--ignore-missing-imports, --explicit-package-bases, --exclude, '(/tests/|/venv/)']

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: [--profile=black]
